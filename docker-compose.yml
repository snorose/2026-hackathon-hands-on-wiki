services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "127.0.0.1:5678:5678"
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      - N8N_PAYLOAD_SIZE_MAX=32
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: unless-stopped
